<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROHUB | Kour.io Official</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff007f;
            --bg-left: #010101;
            --border: rgba(255, 255, 255, 0.1);
            --retrowave-orange: #ff6a00;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg-left); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* THE IMAGE FIX: Fixed on the right, no squashing */
        .retrowave-bg {
            position: fixed;
            top: 0; right: 0;
            width: 60%; 
            height: 100vh;
            /* I am using a direct link to a similar pixel-art style so it works right now */
            background-image: url('https://raw.githubusercontent.com/neuroswap/ddos/main/neurohub-retrowave.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* The Fade Overlay to keep text readable */
        .retrowave-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #010101 0%, rgba(1,1,1,0) 50%);
        }

        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar { 
            width: 320px; 
            min-width: 320px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--border);
            padding: 40px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .sidebar h2 { font-family: 'Orbitron'; color: var(--primary); text-shadow: 0 0 10px var(--primary); letter-spacing: 3px; text-align: center; }

        .nav-tab { padding: 15px; border-radius: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; color: #555; border: 1px solid transparent; }
        .nav-tab.active { color: var(--primary); background: rgba(0, 242, 255, 0.05); border-color: var(--primary); }

        /* CONTENT AREA */
        .content-area { flex: 1; padding: 60px; max-width: 700px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .panel { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-top: 20px; }
        
        /* BUTTONS */
        .btn { 
            background: var(--primary); color: #000; font-family: 'Orbitron'; font-weight: 900; 
            padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; text-decoration: none; 
            display: inline-block; font-size: 0.8rem;
        }
        #download-btn { background: var(--retrowave-orange); color: #fff; box-shadow: 0 0 20px rgba(255, 106, 0, 0.3); }

        /* AUTH GATE */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #080808; border: 2px solid var(--primary); padding: 40px; border-radius: 25px; width: 350px; text-align: center; }
        input { width: 100%; background: #111; border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 10px; }

        /* CHAT */
        #chat-display { height: 350px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; }
        .msg { font-size: 0.8rem; margin-bottom: 8px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; }
        .msg b { color: var(--primary); font-family: 'Orbitron'; font-size: 0.6rem; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-box">
        <h2 style="font-family:'Orbitron'; color:var(--primary);">NEURO ACCESS</h2>
        <input type="text" id="username" placeholder="User">
        <input type="password" id="password" placeholder="Pass">
        <button class="btn" style="width:100%" onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div class="retrowave-bg"></div>

<div class="main-container">
    <div id="main-ui" style="display:none; width:100%; display:flex;">
        <div class="sidebar">
            <h2>NEUROHUB</h2>
            <div class="nav-tab active" onclick="showTab('download', this)">DOWNLOAD</div>
            <div class="nav-tab" onclick="showTab('chat', this)">CHATROOM</div>
            <div class="nav-tab" onclick="showTab('support', this)">SUPPORT</div>
            <div id="admin-tab" class="nav-tab" style="display:none; color:var(--secondary);" onclick="showTab('admin', this)">OWNER</div>
        </div>

        <div class="content-area">
            <div id="download" class="tab-content active">
                <h1 style="font-size: 4rem; margin:0;">V1 INT</h1>
                <p style="color:var(--primary); font-family:'Orbitron';">STATUS: UNDETECTED</p>
                <div class="panel">
                    <p style="color:#777;">Tampermonkey is required.</p>
                    <a href="https://raw.githubusercontent.com/neuroswap/ddos/main/kour-internal.user.js" class="btn" id="download-btn">INSTALL SCRIPT</a>
                </div>
            </div>

            <div id="chat" class="tab-content">
                <h2>CHATROOM</h2>
                <div id="chat-display"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chatInput" placeholder="Message..." style="margin:0;">
                    <button class="btn" onclick="sendMsg()">SEND</button>
                </div>
            </div>
            
            <div id="admin" class="tab-content">
                <h2 style="color:var(--secondary);">OWNER PANEL</h2>
                <button class="btn" style="background:var(--secondary); color:#fff; width:100%;" onclick="db.ref('messages').remove()">WIPE CHAT</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
        authDomain: "neuro-chat-8fe18.firebaseapp.com",
        databaseURL: "https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
        projectId: "neuro-chat-8fe18",
        storageBucket: "neuro-chat-8fe18.firebasestorage.app",
        messagingSenderId: "490069277437",
        appId: "1:490069277437:web:c17aaa860bf4ecfd7b1c94"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";
    let isOwner = false;

    function handleAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === "neuro(owner)" && p === "admin") { isOwner = true; enterHub(u); }
        else if(u && p) { enterHub(u); }
    }

    function enterHub(name) {
        currentUser = name;
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        if(isOwner) document.getElementById('admin-tab').style.display = 'block';
        initChat();
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function initChat() {
        db.ref('messages').limitToLast(20).on('child_added', s => {
            const d = s.val();
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `<b>${d.user.toUpperCase()}</b> ${d.text}`;
            document.getElementById('chat-display').appendChild(m);
        });
    }

    function sendMsg() {
        const t = document.getElementById('chatInput').value;
        if(t) db.ref('messages').push().set({ user: currentUser, text: t });
        document.getElementById('chatInput').value = "";
    }
</script>
</body>
</html>
