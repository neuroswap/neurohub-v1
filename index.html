<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROHUB | Kour.io</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff007f;
            --bg: #010101;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- LOGIN OVERLAY --- */
        #auth-gate {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: #080808;
            border: 2px solid var(--primary);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: var(--glow);
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 15px;
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        /* --- MAIN UI SLIDE ANIMATION --- */
        @keyframes slideUp {
            from { transform: translateY(100vh); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #main-ui {
            display: none;
            height: 100vh;
            padding: 40px;
            flex-direction: column;
            align-items: center;
            animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        /* --- BIG ROUND BUTTON --- */
        .install-btn {
            background: var(--primary);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            padding: 25px 70px;
            border-radius: 100px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            box-shadow: var(--glow);
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        .install-btn:hover {
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 0 40px var(--primary);
        }

        /* --- GRID CONTENT --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 40px;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
        }

        .feat-item {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        /* --- CHAT AREA --- */
        #chat-box {
            height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 10px;
        }

        .msg {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .msg.owner { border-left: 3px solid var(--secondary); color: var(--secondary); }

        .chat-input-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        /* --- ADMIN MODE --- */
        body.admin-mode h1 { background: linear-gradient(to right, #fff, var(--secondary)); }
        body.admin-mode .install-btn { background: var(--secondary); box-shadow: 0 0 20px var(--secondary); }

    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="auth-gate">
    <div class="auth-box">
        <h2 style="font-family: 'Orbitron'; color: var(--primary);">NEUROHUB LOGIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="install-btn" style="padding: 15px; width: 100%; font-size: 1rem;" onclick="login()">AUTHORIZE</button>
    </div>
</div>

<div id="main-ui">
    <div class="hero">
        <h1>NEUROHUB</h1>
        <p style="font-family: 'Orbitron'; color: var(--primary); letter-spacing: 5px;">KOUR.IO CHEAT HUB</p>
        <a href="chrome-extension://dhdgffkkebhmkfjojejmpbldmpobfkfo/options.html#nav=b61323f3-d211-4a7d-a58e-8b199d2549d1+editor" class="install-btn">INSTALL NOW</a>
    </div>

    <div class="grid">
        <div class="panel">
            <h3 style="font-family: 'Orbitron';">FEATURES</h3>
            <div class="feat-item">● AIMBOT</div>
            <div class="feat-item">● ESP</div>
            <div class="feat-item">● CROSSHAIR</div>
            <div class="feat-item">● FULL MENU</div>
        </div>

        <div class="panel" style="grid-column: span 2;">
            <h3 style="font-family: 'Orbitron';">GLOBAL TRANSMISSION (24H)</h3>
            <div id="chat-box"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Type a message..." style="margin:0;">
                <button class="install-btn" style="margin:0; padding: 10px 20px; font-size: 0.8rem;" onclick="send()">SEND</button>
            </div>
        </div>

        <div class="panel" style="grid-column: span 3;">
            <h3 style="font-family: 'Orbitron';">SUPPORT TICKETS</h3>
            <div id="ticket-area" style="display:flex; gap: 20px;">
                <div style="flex:1;">
                    <input type="text" id="t-subject" placeholder="Subject">
                    <textarea id="t-msg" placeholder="Describe issue..." style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; color:white; padding:10px;"></textarea>
                    <button class="install-btn" style="padding:10px; font-size:0.8rem;" onclick="fileTicket()">FILE TICKET</button>
                </div>
                <div id="ticket-list" style="flex:1; background:rgba(0,0,0,0.3); border-radius:10px; padding:10px; max-height: 150px; overflow-y: auto;">
                    <em>No active tickets.</em>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- API CONFIG (SECURED PLACEHOLDER) ---
    const firebaseConfig = {
        apiKey: "AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
        authDomain: "neuro-chat-8fe18.firebaseapp.com",
        databaseURL: "https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
        projectId: "neuro-chat-8fe18",
        storageBucket: "neuro-chat-8fe18.firebasestorage.app",
        messagingSenderId: "490069277437",
        appId: "1:490069277437:web:c17aaa860bf4ecfd7b1c94"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = "";
    let isOwner = false;

    // --- FALLING STARS ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<100; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*5+2, l: Math.random()*15+5});
        }
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = "#00f2ff55";
        ctx.lineWidth = 2;
        stars.forEach(s => {
            ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
            s.y += s.s; if(s.y > canvas.height) s.y = -20;
        });
        requestAnimationFrame(draw);
    }
    initStars(); draw();

    // --- AUTH ---
    function login() {
        user = document.getElementById('username').value;
        let pass = document.getElementById('password').value;
        if(!user || !pass) return;

        if(user === "neuro(owner)" && pass === "admin") {
            isOwner = true;
            document.body.classList.add('admin-mode');
        }

        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        loadData();
    }

    // --- CHAT & TICKETS ---
    function send() {
        let text = document.getElementById('chatInput').value;
        if(!text) return;
        db.ref('messages').push().set({user, text, owner: isOwner});
        document.getElementById('chatInput').value = "";
    }

    function loadData() {
        db.ref('messages').limitToLast(10).on('child_added', (s) => {
            let d = s.val();
            let m = document.createElement('div');
            m.className = `msg ${d.owner ? 'owner' : ''}`;
            m.innerHTML = `<strong>${d.user}:</strong> ${d.text}`;
            document.getElementById('chat-box').appendChild(m);
        });
    }

    function fileTicket() {
        let sub = document.getElementById('t-subject').value;
        let body = document.getElementById('t-msg').value;
        if(!sub || !body) return;
        db.ref('tickets').push().set({user, sub, body});
        alert("Ticket Filed!");
    }
</script>
</body>
</html>
