<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROHUB | Elite Portal</title>
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/00f2ff/skull.png" type="image/png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00f2ff; --secondary: #ff007f; --bg: #010101; --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 242, 255, 0.2); }
        * { cursor: crosshair !important; box-sizing: border-box; transition: 0.2s ease; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #starfield { position: fixed; inset: 0; z-index: -1; pointer-events: none; background: #000; }

        /* Auth Gate */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #080808; border: 2px solid var(--primary); padding: 50px; border-radius: 30px; width: 400px; text-align: center; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); }
        
        /* Layout */
        #main-ui { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        .sidebar { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .nav-tab { padding: 16px; border-radius: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; color: #555; display: flex; align-items: center; gap: 12px; letter-spacing: 1px; }
        .nav-tab.active { color: var(--primary); background: rgba(0, 242, 255, 0.08); border: 1px solid var(--primary); }
        
        /* Content Area */
        .content-area { padding: 50px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.4s ease forwards; }
        .tab-content.active { display: block; }
        .panel { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }

        /* Buttons & Inputs */
        .btn { background: var(--primary); color: #000; font-family: 'Orbitron'; font-weight: 900; padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.75rem; text-decoration: none; display: inline-block; width: 100%; text-align: center; }
        .btn-discord { background: #5865F2; color: white; margin-top: 15px; }
        .btn-secondary { background: var(--secondary); color: white; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; color: white; border-radius: 8px; margin-bottom: 10px; outline: none; }

        /* Sub-Tabs */
        .sub-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .sub-tab { cursor: pointer; font-family: 'Orbitron'; font-size: 0.65rem; color: #444; padding: 5px 12px; }
        .sub-tab.active { color: var(--primary); }

        #logout-btn { position: absolute; bottom: 20px; left: 20px; font-size: 0.6rem; color: var(--secondary); background: none; border: 1px solid var(--secondary); padding: 6px 12px; border-radius: 5px; font-family: 'Orbitron'; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="auth-gate">
    <div class="auth-box">
        <img src="https://img.icons8.com/ios-filled/100/00f2ff/skull.png" style="width:60px; margin-bottom:20px;">
        <h2 style="font-family: 'Orbitron'; color: var(--primary); margin-bottom: 30px; letter-spacing: 4px;">NEUROHUB</h2>
        <button class="btn btn-discord" onclick="loginWithDiscord()">LOGIN WITH DISCORD</button>
        <p style="font-size: 0.6rem; color: #444; margin-top: 20px; font-family: 'Orbitron';">SECURED ACCESS ONLY</p>
    </div>
</div>

<div id="main-ui">
    <div class="sidebar">
        <div style="text-align:center; margin-bottom:30px;">
            <h2 style="font-family:'Orbitron'; color:var(--primary); font-size:1.1rem; letter-spacing:2px;">NEUROHUB</h2>
        </div>
        
        <div class="nav-tab active" onclick="showTab('dash', this)">DASHBOARD</div>
        <div class="nav-tab" onclick="showTab('products', this)">MODULES</div>
        <div id="admin-tab" class="nav-tab" style="display:none; color:var(--secondary); border-color: var(--secondary);" onclick="showTab('admin', this)">OWNER PANEL</div>
        
        <button id="logout-btn" onclick="logout()">TERMINATE SESSION</button>
    </div>

    <div class="content-area">
        <div id="dash" class="tab-content active">
            <div id="user-profile" style="text-align:center; padding-top:10vh;">
                </div>
        </div>

        <div id="products" class="tab-content">
            <h1 style="font-family:'Orbitron'; font-size: 1.5rem;">CENTRAL MODULES</h1>
            <div class="sub-nav">
                <div class="sub-tab active" id="st-opt" onclick="toggleCat('optimizers')">OPTIMIZERS</div>
                <div class="sub-tab" id="st-cht" onclick="toggleCat('cheats')">CHEATS</div>
            </div>

            <div id="cat-optimizers">
                <div class="panel">
                    <h3 style="color:var(--primary); font-family:'Orbitron';">V6 ELITE OPTIMIZER</h3>
                    <p style="color:#777; font-size:0.8rem;">Advanced kernel-level latency reduction.</p>
                    <a href="https://cdn.discordapp.com/attachments/1494771382188245186/1494771426979221694/NeuroHub_V6_Elite.exe" class="btn" style="width:200px;">DOWNLOAD</a>
                </div>
            </div>

            <div id="cat-cheats" style="display:none;">
                <div class="panel">
                    <h3 style="color:var(--secondary); font-family:'Orbitron';">KOUR.IO INTERNAL</h3>
                    <p style="color:#777; font-size:0.8rem;">Silent Aim & ESP Stream-proof suite.</p>
                    <a href="https://raw.githubusercontent.com/neuroswap/ddos/main/kour-internal.user.js" class="btn btn-secondary" style="width:200px;">INSTALL</a>
                </div>
            </div>
        </div>

        <div id="admin" class="tab-content">
            <h2 style="font-family:'Orbitron'; color: var(--secondary);">COMMAND CENTER</h2>
            <div class="panel">
                <h3 style="font-size:0.9rem;">ID BLACKLIST</h3>
                <input type="text" id="ban-id" placeholder="Discord User ID">
                <button class="btn btn-secondary" onclick="executeBan()">CONFIRM BAN</button>
            </div>
            <div class="panel">
                <h3 style="font-size:0.9rem;">LOGGED SESSIONS</h3>
                <div id="admin-log" style="font-size:0.7rem; color:#555; max-height:200px; overflow:auto;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
        authDomain: "neuro-chat-8fe18.firebaseapp.com",
        databaseURL: "https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
        projectId: "neuro-chat-8fe18",
        storageBucket: "neuro-chat-8fe18.firebasestorage.app",
        messagingSenderId: "490069277437",
        appId: "1:490069277437:web:c17aaa860bf4ecfd7b1c94"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CLIENT_ID = '1494822241089880205';
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    function loginWithDiscord() {
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
    }

    window.onload = async () => {
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = fragment.get('access_token');

        if (accessToken) {
            const response = await fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const user = await response.json();
            if (user.id) {
                localStorage.setItem('neuroUser', user.username);
                localStorage.setItem('neuroPFP', `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`);
                localStorage.setItem('neuroID', user.id);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        const currentID = localStorage.getItem('neuroID');
        if (currentID) {
            // BAN CHECK
            const ban = await db.ref('bans/' + currentID).once('value');
            if (ban.exists()) {
                alert("ACCESS REVOKED: DISCORD ID BLACKLISTED");
                logout(); return;
            }

            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            
            document.getElementById('user-profile').innerHTML = `
                <img src="${localStorage.getItem('neuroPFP')}" style="width:120px; border-radius:50%; border:3px solid var(--primary); box-shadow:0 0 30px rgba(0,242,255,0.2);">
                <h1 style="font-family:'Orbitron'; letter-spacing:5px; margin-top:20px;">WELCOME, ${localStorage.getItem('neuroUser').toUpperCase()}</h1>
                <p style="color:#444; font-family:'Orbitron'; font-size:0.7rem;">UID: ${currentID}</p>
            `;

            // OWNER CHECK - REPLACE WITH YOUR ACTUAL DISCORD ID
            if (currentID === 'YOUR_DISCORD_ID_HERE') {
                document.getElementById('admin-tab').style.display = 'flex';
                localStorage.setItem('neuroIsOwner', 'true');
            }
        }
        initStars(); drawStars();
    };

    function executeBan() {
        const id = document.getElementById('ban-id').value;
        if(id) { db.ref('bans/' + id).set(true); alert("ID BLACKLISTED"); }
    }

    function toggleCat(cat) {
        document.getElementById('cat-optimizers').style.display = cat === 'optimizers' ? 'block' : 'none';
        document.getElementById('cat-cheats').style.display = cat === 'cheats' ? 'block' : 'none';
        document.getElementById('st-opt').classList.toggle('active', cat === 'optimizers');
        document.getElementById('st-cht').classList.toggle('active', cat === 'cheats');
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function logout() { localStorage.clear(); location.reload(); }

    // STARS
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, l:Math.random()*25+10, s:Math.random()*12+5});
    }
    function drawStars() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        stars.forEach(s => {
            let g = ctx.createLinearGradient(s.x, s.y, s.x, s.y+s.l);
            g.addColorStop(0, "transparent");
            g.addColorStop(1, localStorage.getItem('neuroIsOwner') === 'true' ? "#ff007f" : "#00f2ff");
            ctx.strokeStyle = g; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
            s.y += s.s; if(s.y > canvas.height) s.y = -s.l;
        });
        requestAnimationFrame(drawStars);
    }
    window.onresize = initStars;
</script>
</body>
</html>
